# Standalone workspace for when this kit is cloned as its own repo. Inside the
# onchainpal monorepo the ROOT pnpm-workspace.yaml is authoritative (it globs
# kit/packages/* + kit/proxy); this file is used only for standalone clones.
packages:
  - "packages/*"
  - "proxy"
  # interim home of the ai3-inference library (extraction plan 2026-07-08);
  # hosts consuming the kit as a submodule add kit/ai3-inference/packages/*
  - "ai3-inference/packages/*"
